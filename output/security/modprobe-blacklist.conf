# Module blacklist for CVE-2026-31431 (Copyfail) mitigation
# This file should be copied to /etc/modprobe.d/ on the target system
#
# CVE-2026-31431: algif_aead buffer overflow vulnerability
# The algif_aead kernel module allows 4-byte out-of-bounds write primitive
# 
# Interim mitigation: Blacklist the module until full fix is verified
# Note: This requires CONFIG_CRYPTO_USER_API_AEAD=m or =y to have effect

install algif_aead /bin/true
blacklist algif_aead