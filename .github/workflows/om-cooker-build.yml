name: "sslinuX-4.20 Fast-Build"

on:
  push:
    branches: [ "main", "ssX-dev" ]
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup OpenMandriva Cooker Repos
        run: |
          sudo apt-get update && sudo apt-get install -y dnf
          
          # Create BOTH possible repo paths to be safe
          sudo mkdir -p /etc/yum.repos.d/ /etc/dnf/repos.d/
          
          # Write the repo file to the legacy path which Ubuntu's DNF prefers
          sudo tee /etc/yum.repos.d/openmandriva-cooker.repo <<EOF
          [cooker-x86_64]
          name=OpenMandriva Cooker x86_64
          baseurl=http://mirror.openmandriva.org/cooker/repository/x86_64/main/release/
          enabled=1
          gpgcheck=0
          # Ensure we don't try to use system variables that don't exist on Ubuntu
          repo_gpgcheck=0
          EOF

          # Force dnf to acknowledge the new repo and the 'cooker' version
          sudo dnf --releasever=cooker clean all
          sudo dnf --releasever=cooker makecache
          
          # Install using the explicit releasever and enablerepo
          sudo dnf --releasever=cooker --disablerepo="*" --enablerepo="cooker-x86_64" install -y \
            gcc clang make binutils flex bison \
            elfutils-devel openssl-devel kernel-desktop-devel \
            bc dwarves
      - name: Build sslinuX Kernel
        run: |
          # Use the latest Cooker headers to guide the build if needed
          export KERN_DIR=$(ls -d /usr/src/kernels/* | head -n 1)
          echo "Building against headers in: $KERN_DIR"
          
          # Initialize ssX config
          make x86_64_defconfig
          
          # Speed up build with all available cores
          make -j$(nproc) bzImage modules

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sslinuX-4.20-bzImage
          path: arch/x86/boot/bzImage
