name: "CodeQL Advanced"

on:
  push:
    branches: [ "main", "ssX-dev" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '41 17 * * 4'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: c-cpp
          # CHANGED: Switched to manual to handle the kernel build process
          build-mode: manual
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Setup OpenMandriva Cooker Repos (Crucial for sslinuX dependencies)
    - name: Install Cooker Build Dependencies
      if: matrix.language == 'c-cpp'
      run: |
        sudo apt-get update && sudo apt-get install -y dnf
        sudo mkdir -p /etc/dnf/repos.d/
        sudo tee /etc/dnf/repos.d/openmandriva-cooker.repo <<EOF
        [cooker-x86_64]
        name=OpenMandriva Cooker x86_64
        baseurl=http://mirror.openmandriva.org/cooker/repository/x86_64/main/release/
        enabled=1
        gpgcheck=0
        EOF
        sudo dnf --disablerepo="*" --enablerepo="cooker-x86_64" install -y \
          gcc clang make binutils flex bison elfutils-devel openssl-devel \
          kernel-desktop-devel bc dwarves

    # 2. Initialize CodeQL Tools
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    # 3. Execution of the actual Kernel Build (Manual Trace)
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        # Step A: Generate the .config for the Steam Deck/x86_64 target
        make x86_64_defconfig
        
        # Step B: Compile the kernel. CodeQL hooks into this command.
        # We build 'bzImage' and 'modules' to ensure the entire tree is scanned.
        make -j$(nproc) bzImage modules

    # 4. Final Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
