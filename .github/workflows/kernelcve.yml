name: "Kernel CVE Audit"

on:
  workflow_dispatch:

jobs:
  cve-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coccinelle grep

      - name: Install CVEhound
        run: |
          python -m pip install --upgrade pip
          pip install setuptools cvehound
          cvehound_update_rules

      - name: Comprehensive CVE Scan
        run: |
          echo "--- STARTING FULL KERNEL SCAN ---" > cve_report.txt
          
          echo "## EXPLOITABLE VULNERABILITIES ##" >> cve_report.txt
          cvehound --kernel . --exploit >> cve_report.txt || true
          
          echo -e "\n## HIGH SEVERITY SCAN ##" >> cve_report.txt
          cvehound --kernel . --min-severity high >> cve_report.txt || true
          
          echo "--- SCAN COMPLETE ---" >> cve_report.txt

      - name: Generate Log Summary
        if: always()
        run: |
          if [ -f cve_report.txt ]; then
            echo "### CVE Scan Summary" >> $GITHUB_STEP_SUMMARY
            echo "Findings: $(grep -c 'CVE-' cve_report.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### CVE Scan Failed to produce report" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload CVE Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-cve-report
          path: cve_report.txt
