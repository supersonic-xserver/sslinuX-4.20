name: "Kernel CVE Audit (Cooker)"

on:
  workflow_dispatch:

jobs:
  cve-scan:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker
      options: --user root

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install and Run CVE Scan
        shell: bash
        run: |
          # 1. Refresh and Install System Deps
          dnf --refresh install -y coccinelle python3-pip python3-devel gcc grep tar
          
          # 2. Install CVEhound with root override
          python3 -m pip install --upgrade pip
          python3 -m pip install cvehound --root-user-action=ignore
          
          # 3. Ensure the rules are updated
          # Using python3 -m to ensure it finds the package in the site-packages
          python3 -m cvehound.scripts.update_rules || cvehound_update_rules
          
          # 4. Execute Full Scan
          echo "--- STARTING FULL KERNEL SCAN (COOKER) ---" > cve_report.txt
          
          echo "## EXPLOITABLE VULNERABILITIES ##" >> cve_report.txt
          cvehound --kernel . --exploit >> cve_report.txt || true
          
          echo -e "\n## HIGH SEVERITY SCAN ##" >> cve_report.txt
          cvehound --kernel . --min-severity high >> cve_report.txt || true
          
          echo "--- SCAN COMPLETE ---" >> cve_report.txt

      - name: Generate Log Summary
        if: always()
        run: |
          if [ -f cve_report.txt ]; then
            echo "### CVE Scan Summary (OpenMandriva Cooker)" >> $GITHUB_STEP_SUMMARY
            echo "Findings: $(grep -c 'CVE-' cve_report.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### CVE Scan Failed to produce report" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload CVE Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cooker-kernel-cve-report
          path: cve_report.txt
