name: "Kernel CVE Audit"

on:
  workflow_dispatch:

jobs:
  cve-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Build Modern Spatch
        run: |
          # Remove broken PPA if it was added in a previous run
          sudo add-apt-repository --remove ppa:npalix/coccinelle -y || true
          
          # Install OCaml and build tools
          sudo apt-get update
          sudo apt-get install -y ocaml-nox libpcre3-dev menhir libparmap-ocaml-dev libpcre-ocaml-dev \
                                 autoconf automake libtool make python3-dev
          
          # Build Coccinelle 1.3+ from source
          git clone --depth 1 https://github.com/coccinelle/coccinelle.git
          cd coccinelle
          ./autogen
          ./configure --with-python=python3 --without-ocamllib
          make -j$(nproc)
          sudo make install
          spatch --version  # Should now show 1.3.x

      - name: Install CVEhound
        run: |
          python -m pip install --upgrade pip
          pip install setuptools cvehound
          cvehound_update_rules

      - name: Comprehensive CVE Scan
        run: |
          echo "--- STARTING FULL KERNEL SCAN ---" > cve_report.txt
          
          # Capture both stdout and stderr (2>&1) and use the internal --report flag
          echo "## EXPLOITABLE VULNERABILITIES ##" >> cve_report.txt
          cvehound --kernel . --exploit --report exploit_results.txt 2>&1 || true
          
          echo -e "\n## ALL CVE PATTERNS ##" >> cve_report.txt
          cvehound --kernel . --report full_results.txt 2>&1 || true
          
          # Consolidate results
          cat exploit_results.txt >> cve_report.txt 2>/dev/null || echo "No exploit patterns found." >> cve_report.txt
          cat full_results.txt >> cve_report.txt 2>/dev/null || echo "No general CVEs found." >> cve_report.txt
          
          echo "--- SCAN COMPLETE ---" >> cve_report.txt

      - name: Upload CVE Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-cve-report
          path: cve_report.txt
