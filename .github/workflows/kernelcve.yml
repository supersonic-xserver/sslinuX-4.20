name: "Kernel CVE Audit (Cooker)"

on:
  workflow_dispatch:

jobs:
  cve-scan:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker
      options: --user root

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install and Run CVE Scan
        shell: bash
        run: |
          # 1. Refresh and Install System Deps
          dnf --refresh install -y coccinelle python3-pip python3-devel gcc grep tar
          
          # 2. Install CVEhound + setuptools (for pkg_resources)
          # We force setuptools to ensure the legacy pkg_resources shim is present
          python3 -m pip install --upgrade pip
          python3 -m pip install setuptools cvehound --root-user-action=ignore
          
          # 3. Update CVE rules
          # We call it via 'python3 -m' to bypass any pathing issues with /usr/local/bin
          python3 -m cvehound.scripts.update_rules || cvehound_update_rules
          
          # 4. Execute Full Scan
          echo "--- STARTING FULL KERNEL SCAN (COOKER PY3.14) ---" > cve_report.txt
          
          # We'll run cvehound through python3 -m to ensure it sees setuptools
          python3 -m cvehound.scripts.cvehound --kernel . --exploit >> cve_report.txt || true
          python3 -m cvehound.scripts.cvehound --kernel . --min-severity high >> cve_report.txt || true
          
          echo "--- SCAN COMPLETE ---" >> cve_report.txt

      - name: Generate Log Summary
        if: always()
        run: |
          if [ -f cve_report.txt ]; then
            echo "### CVE Scan Summary (OpenMandriva Cooker)" >> $GITHUB_STEP_SUMMARY
            echo "Findings: $(grep -c 'CVE-' cve_report.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### CVE Scan Failed to produce report" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload CVE Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cooker-kernel-cve-report
          path: cve_report.txt
